<div class="part-form-container" data-testid="part-form">
  <h3>{{ getPageTitle() }}</h3>

  <form (ngSubmit)="onSubmit()">
    <div *ngIf="formError" class="error-box" data-testid="form-error">
      {{ formError }}
    </div>

    <div class="form-group">
      <label for="partCode">Part Code *</label>
      <input
        type="text"
        id="partCode"
        name="partCode"
        [(ngModel)]="partCode"
        [disabled]="submitting"
        maxlength="50"
        required
        data-testid="part-code-input"
      />
      <span class="form-hint">A unique identifier for this part (e.g., PART-001)</span>
      <div *ngIf="fieldErrors['partCode']" class="error" data-testid="part-code-error">
        {{ fieldErrors['partCode'] }}
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        name="description"
        [(ngModel)]="description"
        [disabled]="submitting"
        maxlength="255"
        rows="2"
        data-testid="description-input"
      ></textarea>
      <span class="form-hint">A brief description of the part</span>
      <div *ngIf="fieldErrors['description']" class="error" data-testid="description-error">
        {{ fieldErrors['description'] }}
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="unitPrice">Unit Price</label>
        <input
          type="number"
          id="unitPrice"
          name="unitPrice"
          [(ngModel)]="unitPrice"
          [disabled]="submitting"
          min="0"
          step="0.01"
          data-testid="unit-price-input"
        />
        <span class="form-hint">Price in USD</span>
        <div *ngIf="fieldErrors['unitPrice']" class="error" data-testid="unit-price-error">
          {{ fieldErrors['unitPrice'] }}
        </div>
      </div>

      <div class="form-group">
        <label for="displayOrder">Display Order</label>
        <input
          type="number"
          id="displayOrder"
          name="displayOrder"
          [(ngModel)]="displayOrder"
          [disabled]="submitting"
          min="0"
          step="1"
          data-testid="display-order-input"
        />
        <span class="form-hint">Order for displaying parts</span>
        <div *ngIf="fieldErrors['displayOrder']" class="error" data-testid="display-order-error">
          {{ fieldErrors['displayOrder'] }}
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button
        type="submit"
        class="btn-primary"
        [disabled]="submitting"
        data-testid="submit-button"
      >
        {{ submitting ? (isEditMode ? 'Updating...' : 'Creating...') : (isEditMode ? 'Update' : 'Create') }}
      </button>
      <button
        type="button"
        class="btn-secondary"
        (click)="onCancel()"
        [disabled]="submitting"
        data-testid="cancel-button"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
