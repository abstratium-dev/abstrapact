<div class="header">
    <div class="header-left">
        <img [src]="brandLogoUrl$()" [alt]="brandLogoAlt$()" class="logo">
        <span class="brand-name">{{ brandName$() }}</span>
    </div>

    <div class="header-right">
        <button 
            class="theme-toggle-btn" 
            (click)="toggleTheme()" 
            [attr.aria-label]="themeService.theme$() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'"
            [title]="themeService.theme$() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'">
            @if(themeService.theme$() === 'light') {
                🌙
            } @else {
                ☀️
            }
        </button>
        &nbsp;|&nbsp;
        <a id="legal-link" routerLink="/legal" routerLinkActive="inactive-link">legal</a>
        @if(isSignedIn) {
            &nbsp;|&nbsp;
            <a id="products-link" routerLink="/product-definitions" routerLinkActive="inactive-link">product definitions</a>
            &nbsp;|&nbsp;
            <span class="signout-wrapper">
                <svg class="session-clock" viewBox="0 0 18 18" [attr.aria-label]="sessionMinutesRemaining + ' minutes until sign-out'">
                    <title>{{ sessionMinutesRemaining }} min until sign-out</title>
                    <circle class="session-clock-bg" cx="9" cy="9" r="7"/>
                    <circle class="session-clock-fill" cx="9" cy="9" r="7"
                        [style.stroke-dashoffset]="sessionClockDashoffset"/>
                </svg>
                <a id="signout-link" class="alink" (click)="signOut()">Sign out</a>
            </span>
        }@else {
            &nbsp;|&nbsp;
            <a id="signin-link" class="alink" (click)="signIn()">Sign in</a>
        }
    </div>
</div>
