# Test configuration - use H2 in-memory database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=MySQL
quarkus.datasource.username=sa
quarkus.datasource.password=

# Run Flyway migrations at startup
quarkus.flyway.clean-at-start=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.placeholders.default_org_uuid=${default.org.uuid}
default.org.uuid=00000000-0000-0000-0000-000000000000

# Load import.sql after migrations
quarkus.hibernate-orm.sql-load-script=import.sql

# Show SQL for debugging
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.schema-management.strategy=none

# Logging
quarkus.log.level=INFO
quarkus.log.category."dev.abstratium".level=DEBUG
